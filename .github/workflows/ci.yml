name: CI

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
    - name: 💾 Check out repository
      uses: actions/checkout@v6

    - name: 🛠️ Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: 🧪 Run tests
      run: go test ./...
